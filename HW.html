<html>
<head>
   <title>作業</title>
    <style>
#s1, #s2, #s3 {
            width: 250px;
            display: inline-block;
            vertical-align/*垂直方向對齊*/: top;
            margin: 10px;
        }

       #t1{
           width: 0;
           height:0;
           border:solid ;
           border-color: transparent transparent green/*linear-gradient(to bottom,rgb(35, 168, 26),rgb(20, 82, 20))*/ transparent;
           border-width: 0px 30px 30px 30px;
           margin-left: 65px;
           position: relative;

       }
       #t2{
           width: 10;
           height:0;
           border:solid ;
           border-color: transparent transparent green/*linear-gradient(to bottom,rgb(35, 168, 26),rgb(20, 82, 20))*/ transparent;
           border-width: 0px 50px 50px 50px;
           margin-left: 40px;
           position: relative;

       }
       #t3{
           width: 30;
           height:0;
           border:solid ;
           border-color: transparent transparent green/*linear-gradient(to bottom,rgb(35, 168, 26),rgb(20, 82, 20))*/ transparent;
           border-width: 0px 80px 80px 80px;
           margin-left: 0px; 
           position: relative;
       }

        #t4 {
            width: 30px;
            height: 40px;
            background-color: brown;
            margin-left: 75px;
        }

        #i1 {
            width: 100px;
            height: 50px;
            background-color: pink;
            border-radius: 50px 50px 0 0;
            margin-left: 80px;
            position: relative;
            top: 50px;
            z-index: 2;
        }

        #i2 {
            width: 100px;
            height: 50px;
            background-color: yellow;
            border-radius: 50px 50px 0 0;
            margin-left: 80px;
            position: relative;
            top: 40px;
            z-index: 1;
        }

        #i3 {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-top: 120px solid orange;
            margin-left: 80px;
            position: relative;
            top: 35px;
        }

        #m1 {
            width: 100px;
            height: 160px;
            background-color: yellow;
            border-radius: 50px 50px 30px 30px;
            margin-left: 80px;
            margin-top: 50px;
            position: relative;
            border: 1px solid black;
        }

        #m7 {
            width: 100px;
            height: 60px;
            background-color: blue;
            position: absolute;
            bottom: 0;
            border-radius: 0 0 30px 30px;
        }

        #m2 {
            width: 110px;
            height: 12px;
            background-color: black;
            position: absolute;
            top: 40px;
            left: -5px;
        }

        #m3 {
            width: 50px;
            height: 50px;
            background-color: gray;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            left: 25px;
        }

        #m4 {
            width: 34px;
            height: 34px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            left: 8px;
        }

        #m5 {
            width: 12px;
            height: 12px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
            top: 11px;
            left: 11px;
        }

        #m6 {
            width: 30px;
            height: 8px;
            background-color: red;
            position: absolute;
            top: 100px;
            left: 35px;
            border-radius: 0 0 15px 15px;
        }

        #m10 {
            width: 25px;
            height: 15px;
            background-color: black;
            position: absolute;
            bottom: -15px;
            left: 15px;
            border-radius: 10px 10px 0 0;
        }

        #m11 {
            width: 25px;
            height: 15px;
            background-color: black;
            position: absolute;
            bottom: -15px;
            right: 15px;
            border-radius: 10px 10px 0 0;
        }
    </style>
</head>
<body>

    <div id="s1">
        <p>聖誕樹</p>
        <div id="t1"></div>
        <div id="t2"></div>
        <div id="t3"></div>
        <div id="t4"></div>
    </div>

    <div id="s2">
        <p>冰淇淋</p>
        <div id="i1"></div>
        <div id="i2"></div>
        <div id="i3"></div>
    </div>

    <div id="s3">
        <p>小小兵</p>
        <div id="m1">
            <div id="m7"></div>
            <div id="m2"></div>
            <div id="m3">
                <div id="m4">
                    <div id="m5"></div>
                </div>
            </div>
            <div id="m6"></div>
            <div id="m10"></div>
            <div id="m11"></div>
        </div>
    </div>

</body>
</html>
