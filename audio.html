<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>圓輪型與心電圖雙向對照音波視覺化</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        button:hover { background-color: #2ea44f; }
        .canvas-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        canvas {
            border: 1px solid #30363d;
            background-color: #010409;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .formula-container {
            margin-top: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            width: 1020px;
            text-align: center;
        }
        .formula-title { color: #58a6ff; margin: 0 0 10px 0; font-size: 14px; }
        #formulaText { font-size: 16px; color: #56d364; word-break: break-all; }
    </style>
</head>
<body>

    <h1>波形對照：左邊【圓輪極座標】 vs 右邊【橫向心電圖】</h1>
    <button id="startBtn">啟動雙向監測對照</button>
    
    <div class="canvas-container">
        <!-- 左圖：圓輪型對照圖 -->
        <canvas id="wheelCanvas" width="500" height="400"></canvas>
        <!-- 右圖：標準橫向心電圖 -->
        <canvas id="waveCanvas" width="540" height="400"></canvas>
    </div>

    <div class="formula-container">
        <div class="formula-title">【 即時聲音傅立葉方程式解析 】</div>
        <div id="formulaText">等待麥克風訊號輸入...</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const wheelCanvas = document.getElementById('wheelCanvas');
        const waveCanvas = document.getElementById('waveCanvas');
        const wCtx = wheelCanvas.getContext('2d');
        const xCtx = waveCanvas.getContext('2d');
        const formulaText = document.getElementById('formulaText');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startBtn.style.display = 'none';

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                
                // 為了讓圓形輪胎邊緣平滑，增加採樣點數
                analyser.fftSize = 1024; 
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                const timeDataArray = new Uint8Array(bufferLength);
                const freqDataArray = new Uint8Array(bufferLength);
                const sampleRate = audioContext.sampleRate;

                function draw() {
                    requestAnimationFrame(draw);

                    analyser.getByteTimeDomainData(timeDataArray);
                    analyser.getByteFrequencyData(freqDataArray);

                    // 清空畫布
                    wCtx.fillStyle = '#010409'; wCtx.fillRect(0, 0, wheelCanvas.width, wheelCanvas.height);
                    xCtx.fillStyle = '#010409'; xCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);

                    // ==========================================
                    // 1. 繪製左圖：圓形輪子型對照圖 (極座標)
                    // ==========================================
                    const centerX = wheelCanvas.width / 2;
                    const centerY = wheelCanvas.height / 2;
                    const baseRadius = 100; // 輪胎基底圓半徑

                    // 繪製圓形參考內外網格 (軸線對照)
                    wCtx.strokeStyle = '#161b22'; wCtx.lineWidth = 1;
                    wCtx.beginPath(); wCtx.arc(centerX, centerY, baseRadius, 0, 2*Math.PI); wCtx.stroke();
                    wCtx.beginPath(); wCtx.arc(centerX, centerY, baseRadius + 50, 0, 2*Math.PI); wCtx.stroke();
                    
                    // 繪製圓輪波形
                    wCtx.lineWidth = 2;
                    wCtx.strokeStyle = '#00adb5'; // 科技藍輪圈
                    wCtx.shadowBlur = 5; wCtx.shadowColor = '#00adb5';
                    wCtx.beginPath();

                    for (let i = 0; i < bufferLength; i++) {
                        // 將 0~255 振幅映射到波幅上
                        const amplitudeModifier = (timeDataArray[i] - 128) * 0.8; 
                        const currentRadius = baseRadius + amplitudeModifier;

                        // 數學核心：將 360 度拆分，利用 sin/cos 算出圓周上的 X, Y 座標
                        const angle = (i / bufferLength) * 2 * Math.PI;
                        const x = centerX + Math.cos(angle) * currentRadius;
                        const y = centerY + Math.sin(angle) * currentRadius;

                        if (i === 0) { wCtx.moveTo(x, y); } else { wCtx.lineTo(x, y); }
                    }
                    wCtx.closePath(); // 讓起點終點相連，封閉成完美圓輪
                    wCtx.stroke();
                    wCtx.shadowBlur = 0;

                    // ==========================================
                    // 2. 繪製右圖：標準橫向心電圖
                    // ==========================================
                    xCtx.strokeStyle = '#161b22';
                    for(let i=0; i<waveCanvas.width; i+=20) {
                        xCtx.beginPath(); xCtx.moveTo(i, 0); xCtx.lineTo(i, waveCanvas.height); xCtx.stroke();
                    }
                    for(let i=0; i<waveCanvas.height; i+=20) {
                        xCtx.beginPath(); xCtx.moveTo(0, i); xCtx.lineTo(waveCanvas.width, i); xCtx.stroke();
                    }

                    xCtx.lineWidth = 2;
                    xCtx.strokeStyle = '#39ff14'; // 經典綠心電圖
                    xCtx.shadowBlur = 5; xCtx.shadowColor = '#39ff14';
                    xCtx.beginPath();

                    const sliceWidth = waveCanvas.width * 1.0 / bufferLength;
                    let waveX = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        const v = timeDataArray[i] / 128.0;
                        const waveY = v * waveCanvas.height / 2;

                        if (i === 0) { xCtx.moveTo(waveX, waveY); } else { xCtx.lineTo(waveX, waveY); }
                        waveX += sliceWidth;
                    }
                    xCtx.lineTo(waveCanvas.width, waveCanvas.height / 2);
                    xCtx.stroke();
                    xCtx.shadowBlur = 0;

                    // ==========================================
                    // 3. 解析最強的三個頻率成分並組合方程式
                    // ==========================================
                    let peaks = [];
                    for (let i = 1; i < bufferLength - 1; i++) {
                        if (freqDataArray[i] > freqDataArray[i-1] && freqDataArray[i] > freqDataArray[i+1] && freqDataArray[i] > 40) {
                            peaks.push({ index: i, val: freqDataArray[i] });
                        }
                    }
                    peaks.sort((a, b) => b.val - a.val);
                    let topPeaks = peaks.slice(0, 3);

                    if (topPeaks.length > 0) {
                        let formulaComponents = [];
                        topPeaks.forEach((p, idx) => {
                            const frequencyHz = Math.round(p.index * sampleRate / analyser.fftSize);
                            const amplitude = (p.val / 255).toFixed(2);
                            const waveType = (idx % 2 === 0) ? 'sin' : 'cos';
                            formulaComponents.push(`${amplitude}·${waveType}(2π·${frequencyHz}t)`);
                        });
                        formulaText.innerHTML = `f(t) ≒ ` + formulaComponents.join(' + ');
                    } else {
                        formulaText.innerHTML = `f(t) ≒ 0 (環境安靜中)`;
                    }
                }

                draw();

            } catch (err) {
                alert('無法讀取麥克風：' + err);
            }
        });
    </script>
</body>
</html>
