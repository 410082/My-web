<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英中字卡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+TC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --card-bg: #18181c;
    --card-front: #1e1e24;
    --card-back: #141420;
    --accent: #c8a96e;
    --accent2: #7c6fcd;
    --text: #e8e4d8;
    --muted: #7a7870;
    --border: #2e2e38;
    --correct: #4caf7d;
    --wrong: #e05c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--accent); letter-spacing: 0.04em; margin-bottom: 4px; text-align: center; }
  .subtitle { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; background: var(--card-bg); border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
  .tab { padding: 7px 18px; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; cursor: pointer; transition: all .2s; letter-spacing: 0.05em; }
  .tab.active { background: var(--accent); color: #0e0e10; font-weight: 600; }

  /* Settings */
  .settings-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .settings-bar label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
  .seg-ctrl { display: flex; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg-ctrl button { padding: 5px 13px; background: transparent; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all .15s; }
  .seg-ctrl button.active { background: var(--accent2); color: #fff; }

  /* Flashcard */
  #flashcard-view { width: 100%; max-width: 420px; }
  .progress-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }
  .progress-label { font-size: 0.72rem; color: var(--muted); min-width: 50px; text-align: right; }
  .card-wrapper { perspective: 1000px; width: 100%; height: 260px; cursor: pointer; margin-bottom: 20px; }
  .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(.4,0,.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 20px; border: 1px solid var(--border); backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 24px; gap: 8px; }
  .card-front { background: linear-gradient(145deg, #1e1e28 0%, #17171f 100%); }
  .card-back { background: linear-gradient(145deg, #16161e 0%, #1a1a28 100%); transform: rotateY(180deg); }
  .card-face-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); position: absolute; top: 16px; left: 20px; }
  .card-pos { font-size: 0.7rem; color: var(--accent2); letter-spacing: 0.1em; margin-top: 4px; }
  .card-word { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text); text-align: center; line-height: 1.2; }
  .card-chinese { font-family: 'Noto Serif TC', serif; font-size: 1.5rem; color: var(--accent); text-align: center; }
  .card-defs { font-size: 0.8rem; color: #b0aaa0; text-align: center; line-height: 1.6; max-width: 320px; }
  .card-defs .def-row { margin-bottom: 3px; }
  .card-defs .pos-tag { color: var(--accent2); font-size: 0.68rem; margin-right: 4px; }
  .card-hint { position: absolute; bottom: 14px; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; }
  .nav-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 1.1rem; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; transition: all .15s; letter-spacing: 0.06em; }
  .shuffle-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Quiz */
  #quiz-view { width: 100%; max-width: 420px; display: none; }
  .quiz-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; margin-bottom: 18px; }
  .quiz-prompt-label { font-size: 0.65rem; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .quiz-prompt { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; color: var(--accent); margin-bottom: 4px; }
  .quiz-prompt-defs { font-size: 0.78rem; color: var(--muted); line-height: 1.6; margin-bottom: 18px; }
  .quiz-prompt-defs .pos-tag { color: var(--accent2); font-size: 0.68rem; }
  .letter-boxes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; justify-content: center; }
  .letter-box { width: 36px; height: 40px; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text); transition: border-color .2s; }
  .letter-box.filled { border-color: var(--accent2); }
  .letter-box.correct-letter { border-color: var(--correct); color: var(--correct); }
  .letter-box.wrong-letter { border-color: var(--wrong); color: var(--wrong); }
  .letter-box.space-box { width: 12px; border: none; }
  .keyboard { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 16px; }
  .key-row { display: flex; gap: 5px; }
  .key { width: 30px; height: 40px; border-radius: 7px; border: 1px solid var(--border); background: var(--card-front); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem; cursor: pointer; transition: all .1s; display: flex; align-items: center; justify-content: center; }
  .key:active { transform: scale(0.92); background: var(--accent2); }
  .key.key-wide { width: 54px; font-size: 0.7rem; }
  .key.used-correct { background: var(--correct); border-color: var(--correct); color: #fff; }
  .key.used-wrong { background: #333; border-color: #333; color: var(--muted); }
  .quiz-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .quiz-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; cursor: pointer; transition: all .15s; letter-spacing: 0.05em; }
  .quiz-btn.primary { background: var(--accent); color: #0e0e10; border-color: var(--accent); font-weight: 600; }
  .quiz-result { text-align: center; padding: 14px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 14px; display: none; }
  .quiz-result.correct { background: rgba(76,175,125,0.12); color: var(--correct); border: 1px solid rgba(76,175,125,0.3); }
  .quiz-result.wrong { background: rgba(224,92,92,0.12); color: var(--wrong); border: 1px solid rgba(224,92,92,0.3); }
  .quiz-score { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; font-size: 0.78rem; color: var(--muted); }
  .score-val { color: var(--text); font-size: 1rem; }
  .score-correct .score-val { color: var(--correct); }
  .score-wrong .score-val { color: var(--wrong); }

  /* Word List & Search Styles */
  .word-list { width: 100%; max-width: 480px; display: none; }
  .list-search-bar { display: flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 6px 12px; margin-bottom: 12px; gap: 8px; }
  .list-search-icon { color: var(--muted); font-size: 1rem; }
  #list-search { flex: 1; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; }
  .list-search-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; }
  .list-count { font-size: 0.72rem; color: var(--muted); margin-bottom: 14px; padding-left: 4px; }
  
  .wl-item { border-bottom: 1px solid var(--border); }
  .wl-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px 10px; cursor: pointer; gap: 10px; }
  .wl-left { flex: 1; }
  .wl-en-row { display: flex; align-items: center; gap: 10px; }
  .wl-en { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); }
  .wl-speak-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); padding: 2px 8px; font-size: 0.75rem; cursor: pointer;
    transition: all .15s; line-height: 1.6; flex-shrink: 0;
  }
  .wl-speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .wl-speak-btn.playing { border-color: var(--accent2); color: var(--accent2); animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity:1; } to { opacity:0.5; } }
  .wl-pos { font-size: 0.65rem; color: var(--accent2); margin-top: 3px; }
  .wl-right { text-align: right; }
  .wl-zh { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; color: var(--accent); }
  .wl-toggle { font-size: 0.7rem; color: var(--muted); transition: transform .25s; user-select: none; margin-left: 8px; }
  .wl-toggle.open { transform: rotate(90deg); }

  .wl-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
    opacity: 0;
    padding: 0 4px;
  }
  .wl-detail.open { max-height: 600px; opacity: 1; padding-bottom: 16px; }

  .wl-section { margin-bottom: 12px; }
  .wl-section-title {
    font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; border-left: 2px solid var(--accent2);
    padding-left: 7px;
  }
  .wl-def-row { font-size: 0.8rem; color: #b0aaa0; margin-bottom: 4px; line-height: 1.5; }
  .wl-def-row .pos-tag { color: var(--accent2); font-size: 0.68rem; margin-right: 5px; }
  .wl-usage-pill {
    display: inline-block; background: rgba(124,111,205,0.12); border: 1px solid rgba(124,111,205,0.3);
    border-radius: 6px; padding: 3px 9px; font-size: 0.75rem; color: #a899e8;
    margin: 3px 4px 3px 0; font-family: 'Playfair Display', serif; font-style: italic;
  }
  .wl-example { font-size: 0.78rem; color: #b0aaa0; margin-bottom: 6px; line-height: 1.6; border-left: 2px solid var(--border); padding-left: 10px; }
  .wl-example em { color: var(--accent); font-style: normal; font-family: 'Noto Serif TC', serif; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card-wrapper, .quiz-card { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<h1>英中字卡</h1>
<p class="subtitle">vocabulary · 詞彙練習</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('cards')">字卡</button>
  <button class="tab" onclick="switchTab('quiz')">拼字測驗</button>
  <button class="tab" onclick="switchTab('list')">單字表</button>
</div>

<div class="settings-bar" id="card-settings">
  <label>先看：</label>
  <div class="seg-ctrl">
    <button id="show-en-btn" class="active" onclick="setFirstSide('en')">英文</button>
    <button id="show-zh-btn" onclick="setFirstSide('zh')">中文</button>
  </div>
</div>

<div id="flashcard-view">
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">1 / 65</div>
  </div>
  <div class="card-wrapper" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front">
        <span class="card-face-label" id="front-label">English</span>
        <div class="card-pos" id="front-pos"></div>
        <div class="card-word" id="front-word"></div>
        <span class="card-hint">點擊翻面</span>
      </div>
      <div class="card-face card-back">
        <span class="card-face-label" id="back-label">中文</span>
        <div class="card-chinese" id="back-chinese"></div>
        <div class="card-defs" id="back-defs"></div>
        <span class="card-hint">點擊翻面</span>
      </div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="prevCard()">←</button>
    <button class="shuffle-btn" onclick="shuffleCards()">⇄ 隨機</button>
    <button class="nav-btn" id="next-btn" onclick="nextCard()">→</button>
  </div>
</div>

<div id="quiz-view">
  <div class="quiz-score">
    <div class="score-correct">✓ <span class="score-val" id="q-correct">0</span></div>
    <div class="score-wrong">✗ <span class="score-val" id="q-wrong">0</span></div>
    <div>進度 <span class="score-val" id="q-progress">0/??</span></div>
  </div>
  <div class="quiz-card">
    <div class="quiz-prompt-label">請拼出這個詞</div>
    <div class="quiz-prompt" id="q-chinese"></div>
    <div class="quiz-prompt-defs" id="q-defs"></div>
    <div class="letter-boxes" id="q-boxes"></div>
    <div class="keyboard" id="q-keyboard"></div>
  </div>
  <div class="quiz-result" id="q-result"></div>
  <div class="quiz-actions">
    <button class="quiz-btn" onclick="quizSkip()">跳過</button>
    <button class="quiz-btn" onclick="quizHint()">提示</button>
    <button class="quiz-btn primary" id="q-next-btn" onclick="quizNext()" style="display:none">下一題 →</button>
  </div>
</div>

<div class="word-list" id="list-view-wrap" style="display:none;width:100%;max-width:480px;">
  <div class="list-search-bar">
    <span class="list-search-icon">⌕</span>
    <input type="text" id="list-search" placeholder="搜尋單字或中文…" oninput="filterList()" autocomplete="off" spellcheck="false">
    <button class="list-search-clear" id="list-clear-btn" onclick="clearSearch()" style="display:none">✕</button>
  </div>
  <div class="list-count" id="list-count"></div>
  <div id="list-view"></div>
</div>

<script>
const WORDS = [
  // ── New words ──
  { en:"fabricate", zh:"捏造／製造", pos:["v."],
    defs:[{pos:"v.", en:"to invent false information; to construct or manufacture", zh:"捏造（謊言）；製造；偽造"}],
    usage:["fabricate a story","fabricate evidence","fabricate parts"],
    special:"fabricate 有兩個截然不同的意思：①捏造謊言或故事（負面）②製造、組裝（中性）。注意勿混淆。",
    examples:["He fabricated the entire alibi — none of it was true.", "The components are fabricated in a factory overseas.", "She was accused of fabricating evidence."]},
  { en:"biome", zh:"生物群系", pos:["n."],
    defs:[{pos:"n.", en:"a large naturally occurring community of flora and fauna occupying a major habitat", zh:"生物群系；生態區（如熱帶雨林、沙漠等）"}],
    usage:["tropical biome","desert biome","biome diversity"],
    special:"biome 指由氣候決定的大型生態區，例如 tundra（苔原）、rainforest（熱帶雨林）、grassland（草原）等，與 ecosystem（生態系）不同，biome 強調地理尺度更大。",
    examples:["The Amazon rainforest is the world's largest tropical biome.", "Climate change is threatening every major biome on Earth.", "Students mapped the world's major biomes in geography class."]},
  { en:"grip", zh:"抓握／控制", pos:["v."],
    defs:[{pos:"v.", en:"to hold tightly", zh:"緊握；抓住"},{pos:"n.", en:"a firm hold; influence or control", zh:"抓握；控制；影響力"}],
    usage:["grip the wheel","lose one's grip","in the grip of fear","come to grips with"],
    special:"come to grips with = 開始認真應對（某困難）。get a grip = 鎮定下來，控制情緒。",
    examples:["She gripped the railing as the boat rocked.", "Fear had a tight grip on the whole community.", "It's time to come to grips with the problem."]},
  { en:"pluck", zh:"鼓起勇氣／摘", pos:["v."],
    defs:[{pos:"v.", en:"to pull quickly; to pick (a flower/fruit); to play a string instrument by pulling", zh:"採摘；拔；撥（弦）；鼓起（勇氣）"},{pos:"n.", en:"spirited and determined courage", zh:"勇氣；膽量"}],
    usage:["pluck up courage","pluck a flower","pluck the strings","pluck from obscurity"],
    special:"pluck up courage / pluck up the nerve = 鼓起勇氣（常見固定搭配）。pluck from obscurity = 從默默無名中被發掘。",
    examples:["She finally plucked up the courage to quit her job.", "He plucked a ripe apple from the tree.", "It takes real pluck to speak up in a room full of strangers."]},
  { en:"jury", zh:"陪審團", pos:["n."],
    defs:[{pos:"n.", en:"a group of people sworn to give a verdict in a legal case; a panel of judges in a competition", zh:"陪審團；（比賽）評審團"}],
    usage:["jury trial","hung jury","the jury is still out","jury duty"],
    special:"the jury is still out（on sth）= 尚無定論，仍有爭議。hung jury = 陪審團意見分歧，無法達成裁決。jury duty = 陪審義務（公民責任）。",
    examples:["The jury reached a unanimous verdict of not guilty.", "The jury is still out on whether the new policy will work.", "She was called for jury duty next month."]},
  { en:"trial", zh:"審判／試驗", pos:["n."],
    defs:[{pos:"n.", en:"a formal examination of evidence in court; a test of performance or quality", zh:"審判；試驗；試用"},{pos:"v.", en:"to test something", zh:"試驗；試用"}],
    usage:["stand trial","clinical trial","trial and error","on trial","trial run","trial period"],
    special:"trial and error = 嘗試錯誤法。stand trial = 接受審判。on trial = ①受審②試用中。clinical trial = 臨床試驗（醫學）。",
    examples:["The suspect will stand trial next month.", "The new drug is currently in clinical trials.", "I learned to cook through trial and error."]},

  // ── Original words (感受 removed) ──
  { en:"imbue", zh:"賦予", pos:["v."],
    defs:[{pos:"v.", en:"to inspire or permeate with a quality or feeling", zh:"賦予；使充滿（某種特質或情感）"}],
    usage:["imbue with confidence","imbue with meaning","imbue with a sense of purpose"],
    special:"imbue 通常以被動語態出現：be imbued with…（充滿……），語氣正式，常用於文學或演講。",
    examples:["The speech was imbued with hope and determination.", "She tried to imbue her students with a love of learning.", "His work is imbued with a deep sense of melancholy."]},
  { en:"nasty", zh:"可惡的", pos:["adj."],
    defs:[{pos:"adj.", en:"unpleasant, spiteful, or offensive", zh:"可惡的；令人厭惡的；惡劣的"}],
    usage:["nasty weather","nasty surprise","nasty habit","turn nasty"],
    special:"turn nasty = 突然變得惡劣或暴力。a nasty piece of work = 非常難相處或卑鄙的人（英式口語）。",
    examples:["The weather turned nasty overnight.", "He said some really nasty things to her.", "That was a nasty surprise — nobody expected the price hike."]},
  { en:"permission", zh:"允許", pos:["n."],
    defs:[{pos:"n.", en:"the act of officially allowing something; consent granted", zh:"允許；許可；批准"}],
    usage:["ask for permission","grant permission","with permission","written permission","permission slip"],
    special:"permission 是不可數名詞，不說 a permission；正式場合用 obtain permission（取得許可）。與 permit（v./n.）區分：permit 可當動詞用。",
    examples:["You need written permission to use the photos.", "She asked for permission to leave early.", "He granted permission for the construction to begin."]},
  { en:"mediocre", zh:"平庸", pos:["adj."],
    defs:[{pos:"adj.", en:"of only moderate quality; neither good nor bad", zh:"平庸的；二流的；普通的"}],
    usage:["mediocre performance","mediocre results","settle for mediocre"],
    special:"mediocrity（名詞）= 平庸；平凡。常含輕蔑意味，暗示「本可以更好」。",
    examples:["The film received mediocre reviews from critics.", "She refused to settle for mediocrity in her career.", "His mediocre grades didn't reflect his actual intelligence."]},
  { en:"debate", zh:"辯論", pos:["n."],
    defs:[{pos:"n.", en:"a formal discussion of opposing arguments", zh:"辯論；討論；爭議"},{pos:"v.", en:"to argue about a subject formally or informally", zh:"辯論；爭論；考慮"}],
    usage:["open to debate","debate the issue","heated debate","under debate","debate whether to…"],
    special:"open to debate = 仍有爭議的。debate whether/what to do = 考慮是否做某事（個人內心的猶豫）。",

let deck = [...WORDS];
let currentIdx = 0;
let firstSide = 'en';
let isFlipped = false;

let quizDeck = [];
let quizIdx = 0;
let quizCorrect = 0;
let quizWrong = 0;
let quizTyped = [];
let quizAnswered = false;
let usedKeys = {};
let currentUtterance = null;

function speak(text, btn) {
  window.speechSynthesis.cancel();
  if(btn && btn.classList.contains('playing')) {
    btn.classList.remove('playing');
    return;
  }
  document.querySelectorAll('.wl-speak-btn.playing').forEach(b=>b.classList.remove('playing'));
  
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  if(btn) {
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');
  }
  window.speechSynthesis.speak(utter);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['cards','quiz','list'][i]===tab);
  });
  document.getElementById('flashcard-view').style.display = tab==='cards' ? 'block' : 'none';
  document.getElementById('card-settings').style.display = tab==='cards' ? 'flex' : 'none';
  document.getElementById('quiz-view').style.display = tab==='quiz' ? 'block' : 'none';
  
  // 核心 Bug 修正：在這裡正常顯示最外層容器外殼
  document.getElementById('list-view-wrap').style.display = tab==='list' ? 'block' : 'none';
  
  if(tab==='quiz') initQuiz();
  if(tab==='list') renderList();
}

function setFirstSide(side) {
  firstSide = side;
  document.getElementById('show-en-btn').classList.toggle('active', side==='en');
  document.getElementById('show-zh-btn').classList.toggle('active', side==='zh');
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
}

function renderCard() {
  const w = deck[currentIdx];
  const total = deck.length;
  document.getElementById('progress-fill').style.width = ((currentIdx+1)/total*100)+'%';
  document.getElementById('progress-label').textContent = `${currentIdx+1} / ${total}`;
  
  if(firstSide==='en') {
    document.getElementById('front-label').textContent = 'English';
    document.getElementById('back-label').textContent = '中文';
    document.getElementById('front-pos').textContent = w.pos.join(' / ');
    document.getElementById('front-word').innerHTML = w.en;
    document.getElementById('back-chinese').textContent = w.zh;
    document.getElementById('back-defs').innerHTML = w.defs.map(d=>`<div class="def-row"><span class="pos-tag">${d.pos}</span>${d.zh}${d.en?' — '+d.en:''}</div>`).join('');
  } else {
    document.getElementById('front-label').textContent = '中文';
    document.getElementById('back-label').textContent = 'English';
    document.getElementById('front-pos').textContent = '';
    document.getElementById('front-word').innerHTML = `<span style="font-family:'Noto Serif TC',serif;color:var(--accent)">${w.zh}</span>`;
    document.getElementById('back-chinese').textContent = w.en;
    document.getElementById('back-defs').innerHTML = w.defs.map(d=>`<div class="def-row"><span class="pos-tag">${d.pos}</span>${d.en||''}</div>`).join('');
  }
  document.getElementById('prev-btn').disabled = currentIdx===0;
  document.getElementById('next-btn').disabled = currentIdx===deck.length-1;
}

function flipCard() {
  isFlipped=!isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if(currentIdx < deck.length-1) {
    currentIdx++;
    isFlipped=false;
    document.getElementById('card-inner').classList.remove('flipped');
    renderCard();
  }
}

function prevCard() {
  if(currentIdx > 0) {
    currentIdx--;
    isFlipped=false;
    document.getElementById('card-inner').classList.remove('flipped');
    renderCard();
  }
}

function shuffleCards() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  currentIdx = 0;
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
}

// Quiz Functions
function initQuiz() {
  quizDeck = [...WORDS];
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }
  quizIdx = 0;
  quizCorrect = 0;
  quizWrong = 0;
  document.getElementById('q-correct').textContent = '0';
  document.getElementById('q-wrong').textContent = '0';
  document.getElementById('q-progress').textContent = `1/${quizDeck.length}`;
  loadQuizQuestion();
}

function loadQuizQuestion() {
  quizAnswered = false;
  usedKeys = {};
  document.getElementById('q-result').style.display = 'none';
  document.getElementById('q-next-btn').style.display = 'none';
  
  const w = quizDeck[quizIdx];
  document.getElementById('q-progress').textContent = `${quizIdx+1}/${quizDeck.length}`;
  document.getElementById('q-chinese').textContent = w.zh;
  document.getElementById('q-defs').innerHTML = w.defs.map(d=>`<span class="pos-tag">${d.pos}</span> ${d.zh}`).join('<br>');
  
  const cleanAns = w.en.toLowerCase().replace(/[^a-z ]/g, '');
  quizTyped = Array(cleanAns.length).fill('');
  for(let i=0; i<cleanAns.length; i++) {
    if(cleanAns[i]===' ') quizTyped[i] = ' ';
  }
  
  renderQuizBoxes();
  renderKeyboard();
}

function renderQuizBoxes() {
  const container = document.getElementById('q-boxes');
  container.innerHTML = '';
  const w = quizDeck[quizIdx];
  const cleanAns = w.en.toLowerCase().replace(/[^a-z ]/g, '');

  for(let i=0; i<cleanAns.length; i++) {
    const box = document.createElement('div');
    if(cleanAns[i]===' ') {
      box.className = 'letter-box space-box';
    } else {
      box.className = 'letter-box' + (quizTyped[i]?' filled':'');
      box.textContent = quizTyped[i] ? quizTyped[i].toUpperCase() : '';
      
      if(quizAnswered) {
        if(quizTyped[i] === cleanAns[i]) {
          box.classList.add('correct-letter');
        } else {
          box.classList.add('wrong-letter');
          box.textContent = cleanAns[i].toUpperCase();
        }
      }
    }
    container.appendChild(box);
  }
}

function renderKeyboard() {
  const container = document.getElementById('q-keyboard');
  container.innerHTML = '';
  const rows = ["qwertyuiop", "asdfghjkl", "zxcvbnm"];
  
  rows.forEach((row, rIdx) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'key-row';
    
    if(rIdx===2) {
      const bs = document.createElement('button');
      bs.className = 'key key-wide';
      bs.textContent = '刪除';
      bs.onclick = () => handleKeyInput('backspace');
      bs.disabled = quizAnswered;
      rowDiv.appendChild(bs);
    }
    
    for(let char of row) {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = char.toUpperCase();
      if(usedKeys[char]) {
        btn.classList.add(usedKeys[char]==='correct' ? 'used-correct' : 'used-wrong');
      }
      btn.onclick = () => handleKeyInput(char);
      btn.disabled = quizAnswered;
      rowDiv.appendChild(btn);
    }
    
    if(rIdx===2) {
      const ent = document.createElement('button');
      ent.className = 'key key-wide';
      ent.textContent = '送出';
      ent.onclick = () => handleKeyInput('enter');
      ent.disabled = quizAnswered;
      rowDiv.appendChild(ent);
    }
    container.appendChild(rowDiv);
  });
}

function handleKeyInput(key) {
  if(quizAnswered) return;
  const w = quizDeck[quizIdx];
  const cleanAns = w.en.toLowerCase().replace(/[^a-z ]/g, '');
  
  if(key==='backspace') {
    for(let i=quizTyped.length-1; i>=0; i--) {
      if(cleanAns[i]!==' ' && quizTyped[i]!=='') {
        quizTyped[i] = '';
        break;
      }
    }
    renderQuizBoxes();
  } else if(key==='enter') {
    if(quizTyped.includes('')) return;
    checkQuizAnswer();
  } else {
    const firstEmpty = quizTyped.indexOf('');
    if(firstEmpty !== -1) {
      quizTyped[firstEmpty] = key;
      renderQuizBoxes();
    }
  }
}

function checkQuizAnswer() {
  quizAnswered = true;
  const w = quizDeck[quizIdx];
  const cleanAns = w.en.toLowerCase().replace(/[^a-z ]/g, '');
  const userAns = quizTyped.join('');
  
  const isCorrect = userAns === cleanAns;
  const resDiv = document.getElementById('q-result');
  resDiv.style.display = 'block';
  
  if(isCorrect) {
    quizCorrect++;
    document.getElementById('q-correct').textContent = quizCorrect;
    resDiv.className = 'quiz-result correct';
    resDiv.textContent = '✓ 完全正確！';
    for(let char of cleanAns) {
      if(char!==' ') usedKeys[char] = 'correct';
    }
  } else {
    quizWrong++;
    document.getElementById('q-wrong').textContent = quizWrong;
    resDiv.className = 'quiz-result wrong';
    resDiv.textContent = `✗ 答錯了，正確答案是: ${w.en}`;
    for(let i=0; i<cleanAns.length; i++) {
      if(cleanAns[i]!==' ' && quizTyped[i]!==cleanAns[i]) {
        usedKeys[quizTyped[i]] = 'wrong';
      }
    }
  }
  
  renderQuizBoxes();
  renderKeyboard();
  document.getElementById('q-next-btn').style.display = 'inline-block';
}

function quizSkip() {
  if(quizAnswered) return;
  quizAnswered = true;
  quizWrong++;
  document.getElementById('q-wrong').textContent = quizWrong;
  
  const w = quizDeck[quizIdx];
  const resDiv = document.getElementById('q-result');
  resDiv.style.display = 'block';
  resDiv.className = 'quiz-result wrong';
  resDiv.textContent = `已跳過。正確答案是: ${w.en}`;
  
  renderQuizBoxes();
  renderKeyboard();
  document.getElementById('q-next-btn').style.display = 'inline-block';
}

function quizHint() {
  if(quizAnswered) return;
  const w = quizDeck[quizIdx];
  const cleanAns = w.en.toLowerCase().replace(/[^a-z ]/g, '');
  const firstEmpty = quizTyped.indexOf('');
  if(firstEmpty !== -1) {
    quizTyped[firstEmpty] = cleanAns[firstEmpty];
    renderQuizBoxes();
  }
}

function quizNext() {
  if(quizIdx < quizDeck.length-1) {
    quizIdx++;
    loadQuizQuestion();
  } else {
    alert(`測驗結束！\n正確: ${quizCorrect}\n錯誤: ${quizWrong}`);
    initQuiz();
  }
}

// Word List Functions
function renderList() {
  const query = document.getElementById('list-search').value.toLowerCase().trim();
  const container = document.getElementById('list-view');
  
  const filtered = WORDS.filter(w => {
    return w.en.toLowerCase().includes(query) || w.zh.toLowerCase().includes(query);
  });
  
  document.getElementById('list-count').textContent = `共 ${filtered.length} 個單字`;
  document.getElementById('list-clear-btn').style.display = query ? 'block' : 'none';
  
  if(filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px 0;font-size:0.85rem;">找不到對應的單字</div>';
    return;
  }
  
  container.innerHTML = filtered.map((w) => {
    const originalIdx = WORDS.findIndex(orig => orig.en === w.en);
    const isEn = /^[A-Za-z\s\-]+$/.test(w.en.replace(/[^A-Za-z]/g, ''));
    const speakWord = w.en;
    
    const defsHtml = w.defs.map(d=>`<div class="wl-def-row"><span class="pos-tag">${d.pos}</span>${d.zh}${d.en?' — '+d.en:''}</div>`).join('');
    const usageHtml = w.usage && w.usage.length ? `<div class="wl-section"><div class="wl-section-title">常見用法</div>${w.usage.map(u=>`<span class="wl-usage-pill">${u}</span>`).join('')}</div>` : '';
    const specialHtml = w.special ? `<div class="wl-section"><div class="wl-section-title">特殊說明</div><div class="wl-def-row" style="color:#c4bfb0;">${w.special}</div></div>` : '';
    const examplesHtml = w.examples && w.examples.length ? `<div class="wl-section"><div class="wl-section-title">例句</div>${w.examples.map(e=>`<div class="wl-example">${e}</div>`).join('')}</div>` : '';
    
    return `<div class="wl-item">
      <div class="wl-header" onclick="toggleDetail(${originalIdx})">
        <div class="wl-left">
          <div class="wl-en-row">
            <span class="wl-en">${w.en}</span>
            ${isEn?`<button class="wl-speak-btn" id="speak-${originalIdx}" onclick="event.stopPropagation();speak('${speakWord.replace(/'/g,"\\'")}',this)">▶ 發音</button>`:''}
          </div>
          <div class="wl-pos">${w.pos.join(' / ')}</div>
        </div>
        <div class="wl-right">
          <div class="wl-zh">${w.zh}</div>
        </div>
        <span class="wl-toggle" id="toggle-${originalIdx}">›</span>
      </div>
      <div class="wl-detail" id="detail-${originalIdx}">
        <div class="wl-section"><div class="wl-section-title">定義</div>${defsHtml}</div>
        ${usageHtml}${specialHtml}${examplesHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(idx) {
  const detail = document.getElementById('detail-'+idx);
  const toggle = document.getElementById('toggle-'+idx);
  if (!detail || !toggle) return;
  
  const isOpen = detail.classList.contains('open');
  if(isOpen) {
    detail.classList.remove('open');
    toggle.classList.remove('open');
  } else {
    detail.classList.add('open');
    toggle.classList.add('open');
  }
}

function filterList() {
  renderList();
}

function clearSearch() {
  document.getElementById('list-search').value = '';
  renderList();
}

document.addEventListener('keydown', (e) => {
  const activeTab = document.querySelector('.tab.active').textContent;
  if(activeTab === '拼字測驗') {
    if(quizAnswered) {
      if(e.key === 'Enter') quizNext();
    } else {
      if(e.key >= 'a' && e.key <= 'z') {
        handleKeyInput(e.key);
      } else if(e.key === 'Backspace') {
        handleKeyInput('backspace');
      } else if(e.key === 'Enter') {
        handleKeyInput('enter');
      }
    }
  }
});

renderCard();
</script>
