<html>
<head>
<style>
#background {
    position: relative;
    width: 1000px;
    height: 500px;
    background-color: rgb(192, 192, 192);
    border: solid 50px rgb(78, 77, 77);
    border-radius: 30px;
    overflow: hidden;
}
#gamestartbotton {
    height: 80px;
    width: 80px;
    background-color: rgba(66, 66, 66, 0.829);
    border: solid 20px rgba(255, 255, 255, 0.884);
    position: absolute;
    top: 200px;
    left: 450px;
    z-index: 99;
}
#triangle {
    height: 0px;
    width: 0px;
    border-style: solid;
    position: absolute;
    top: 10px;
    left: 10px;
    border-width: 30px 0px 30px 60px;
    border-color: transparent transparent transparent rgb(53, 52, 52);
}
#player {
    width: 50px;
    height: 50px;
    background: black;
    border-radius: 20px;
    position: absolute;
    left: 100px;
    top: 225px;
    transition: transform 0.1s;
    z-index: 5;
}
#eye {
    width: 30px;
    height: 30px;
    border-radius: 30px;
    background-color: white;
    position: absolute;
    top: 10px;
    right: 5px;
}
#eyeball {
    width: 20px;
    height: 20px;
    border-radius: 20px;
    background-color: black;
    position: absolute;
    top: 5px;
    right: 5px;
}
#reflection {
    width: 10px;
    height: 10px;
    border-radius: 15px;
    background-color: white;
    position: absolute;
    top: 0px;
    right: 0px;
}
#wall-top {
    width: 1000px;
    height: 60px;
    position: absolute;
    top: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
    z-index: 10;
}
#wall-bottom {
    width: 1000px;
    height: 60px;
    position: absolute;
    bottom: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
    z-index: 10;
}
#spike1 {
    position: absolute;
    left: 1000px;
    background-color: rgb(51, 50, 50);
    width: 100px;
    height: 200px;
    top: 240px;
    z-index: 4;
}
#spike2 {
    position: absolute;
    left: 1550px;
    background-color: rgb(51, 50, 50);
    width: 100px;
    height: 200px;
    top: 240px;
    z-index: 4;
}
#score {
    position: absolute;
    top: 75px;
    left: 20px;
    font-size: 24px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: rgb(51, 50, 50);
    z-index: 5;
}
</style>
<script>
gameInterval = null;
timeInterval = null;
playerY = 225;
playerDirection = 1;

spike1X = 1000;
spike1Y = 240;
spike1W = 100;
spike1H = 200;
isSpike1Ceiling = 0;

spike2X = 1550;
spike2Y = 240;
spike2W = 100;
spike2H = 200;
isSpike2Ceiling = 0;

isPlaying = false;
time = 0;
speed = 5;
distance = 0;

function changeDirection() {
    if (isPlaying == false) return;
    playerDirection = playerDirection * -1;
    player = document.getElementById("player");
    if (playerDirection == 1) {
        player.style.transform = "rotate(30deg)";
    } else {
        player.style.transform = "rotate(-30deg)";
    }
}

function checkTriangleCollision(pY, sX, sY, sW, sH, isCeiling) {
    pLeft = 100;
    pRight = 150;
    
    if (sX + sW < pLeft || sX > pRight) {
        return false;
    }

    pCenterX = 125;
    sCenterX = sX + (sW / 2);
    distX = Math.abs(pCenterX - sCenterX);
    
    halfW = sW / 2;
    if (distX >= halfW) {
        return false;
    }
    
    currentSpikeHeight = sH * (1 - (distX / halfW));

    if (isCeiling == 1) {
        spikeBottomEdge = 60 + currentSpikeHeight;
        if (pY < spikeBottomEdge) {
            return true;
        }
    } else {
        spikeTopEdge = 440 - currentSpikeHeight;
        if (pY + 50 > spikeTopEdge) {
            return true;
        }
    }
    return false;
}

function gamestart() {
    if (isPlaying == true) return;
    
    isPlaying = true;
    document.getElementById("gamestartbotton").style.display = "none";
    document.getElementById("player").style.transform = "rotate(30deg)";
    
    document.getElementById("spike1").style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
    document.getElementById("spike2").style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";

    timeInterval = setInterval(function() {
        time++;
        speed = 0.3 * time + 5;
    }, 1000);

    gameInterval = setInterval(function() {
        player = document.getElementById("player");
        s1 = document.getElementById("spike1");
        s2 = document.getElementById("spike2");

        playerY += playerDirection * 5; 
        if (playerY <= 60 || playerY >= 390) {
            alert("Game Over! Distance: " + Math.floor(distance) + "m");
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            location.reload();
            return;
        }
        player.style.top = playerY + "px";

        spike1X -= speed;
        if (spike1X < -spike1W) {
            spike1X = 1000;
            spike1W = Math.floor(Math.random() * 81) + 80;
            spike1H = Math.floor(Math.random() * 121) + 100;
            s1.style.width = spike1W + "px";
            s1.style.height = spike1H + "px";
            if (Math.random() < 0.5) {
                isSpike1Ceiling = 1;
                spike1Y = 60;
                s1.style.clipPath = "polygon(50% 100%, 0% 0%, 100% 0%)";
            } else {
                isSpike1Ceiling = 0;
                spike1Y = 440 - spike1H;
                s1.style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
            }
            s1.style.top = spike1Y + "px";
        }
        s1.style.left = spike1X + "px";

        spike2X -= speed;
        if (spike2X < -spike2W) {
            spike2X = 1000;
            spike2W = Math.floor(Math.random() * 81) + 80;
            spike2H = Math.floor(Math.random() * 121) + 100;
            s2.style.width = spike2W + "px";
            s2.style.height = spike2H + "px";
            if (Math.random() < 0.5) {
                isSpike2Ceiling = 1;
                spike2Y = 60;
                s2.style.clipPath = "polygon(50% 100%, 0% 0%, 100% 0%)";
            } else {
                isSpike2Ceiling = 0;
                spike2Y = 440 - spike2H;
                s2.style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
            }
            s2.style.top = spike2Y + "px";
        }
        s2.style.left = spike2X + "px";

        distance += 0.05;
        document.getElementById("score").innerText = Math.floor(distance) + "m";

        if (checkTriangleCollision(playerY, spike1X, spike1Y, spike1W, spike1H, isSpike1Ceiling)) {
            alert("Game Over! Distance: " + Math.floor(distance) + "m");
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            location.reload();
            return;
        }

        if (checkTriangleCollision(playerY, spike2X, spike2Y, spike2W, spike2H, isSpike2Ceiling)) {
            alert("Game Over! Distance: " + Math.floor(distance) + "m");
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            location.reload();
            return;
        }
    }, 20);
}
</script>
</head>
<body>

<div id="background" onclick="changeDirection()">
    <div id="wall-top"></div>
    <div id="wall-bottom"></div>
    <div id="score">0m</div>
    
    <div id="gamestartbotton" onclick="gamestart()">
        <div id="triangle"></div>
    </div>
    
    <div id="player">
        <div id="eye">
            <div id="eyeball"><div id="reflection"></div></div>
        </div>
    </div>
    
    <div id="spike1"></div>
    <div id="spike2"></div>
</div>

</body>
</html>
