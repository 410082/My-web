<html>
<head>
<style>
#background {
    position: relative;
    width: 1000px;
    height: 500px;
    background-color: rgb(192, 192, 192);
    border: solid 50px rgb(78, 77, 77);
    border-radius: 30px;
    overflow: hidden;
}
#gamestartbotton {
    height: 80px;
    width: 80px;
    background-color: rgba(66, 66, 66, 0.829);
    border: solid 20px rgba(255, 255, 255, 0.884);
    position: absolute;
    top: 200px;
    left: 450px;
    cursor: pointer;
    z-index: 99;
}
#triangle {
    height: 0px;
    width: 0px;
    border-style: solid;
    position: absolute;
    top: 10px;
    left: 10px;
    border-width: 30px 0px 30px 60px;
    border-color: transparent transparent transparent rgb(53, 52, 52);
}
#player {
    width: 50px;
    height: 50px;
    background: black;
    border-radius: 20px;
    position: absolute;
    left: 100px;
    top: 225px;
    transition: transform 0.1s;
    z-index: 5;
}
#eye {
    width: 30px;
    height: 30px;
    border-radius: 30px;
    background-color: white;
    position: absolute;
    top: 10px;
    right: 5px;
}
#eyeball {
    width: 20px;
    height: 20px;
    border-radius: 20px;
    background-color: black;
    position: absolute;
    top: 5px;
    right: 5px;
}
#reflection {
    width: 10px;
    height: 10px;
    border-radius: 15px;
    background-color: white;
    position: absolute;
    top: 0px;
    right: 0px;
}
#wall-top {
    width: 1000px;
    height: 60px;
    position: absolute;
    top: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
    z-index: 10;
}
#wall-bottom {
    width: 1000px;
    height: 60px;
    position: absolute;
    bottom: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
    z-index: 10;
}
#spike {
    width: 0;
    height: 0;
    border-top: 25px solid transparent;
    border-bottom: 25px solid transparent;
    border-right: 50px solid rgb(51, 50, 50);
    position: absolute;
    left: 1000px;
    top: 225px;
    z-index: 4;
}
#score {
    position: absolute;
    top: 75px;
    left: 20px;
    font-size: 24px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: rgb(51, 50, 50);
    z-index: 5;
}
</style>
<script>
let gameInterval;
let timeInterval;
let playerY = 225;
let playerDirection = 1;
let spikeX = 1000;
let spikeY = 225;
let isPlaying = false;
let time = 0;
let speed = 5;
let distance = 0;

function changeDirection() {
    if (!isPlaying) return;
    playerDirection = playerDirection * -1;
    const player = document.getElementById("player");
    if (playerDirection === 1) {
        player.style.transform = "rotate(30deg)";
    } else {
        player.style.transform = "rotate(-30deg)";
    }
}

function gamestart(event) {
    if (event) {
        event.stopPropagation();
    }
    if (isPlaying) return;
    
    isPlaying = true;
    document.getElementById("gamestartbotton").style.display = "none";
    document.getElementById("player").style.transform = "rotate(30deg)";

    timeInterval = setInterval(() => {
        time++;
        speed = 0.15 * time + 5;
    }, 1000);

    gameInterval = setInterval(() => {
        const player = document.getElementById("player");
        const spike = document.getElementById("spike");

        playerY += playerDirection * 5; 
        if (playerY < 60) playerY = 60;
        if (playerY > 390) playerY = 390;
        player.style.top = playerY + "px";

        spikeX -= speed;
        if (spikeX < -50) {
            spikeX = 1000;
            let randTrack = Math.floor(Math.random() * 3);
            if (randTrack === 0) spikeY = 80;
            if (randTrack === 1) spikeY = 225;
            if (randTrack === 2) spikeY = 370;
            spike.style.top = spikeY + "px";
        }
        spike.style.left = spikeX + "px";

        distance += Math.floor(speed);
        document.getElementById("score").innerText = distance + "m";

        if (spikeX < 150 && spikeX + 50 > 100) {
            if (spikeY < playerY + 50 && spikeY + 50 > playerY) {
                alert("Game Over! Distance: " + distance + "m");
                clearInterval(gameInterval);
                clearInterval(timeInterval);
                location.reload();
            }
        }
    }, 20);
}
</script>
</head>
<body>

<div id="background" onclick="changeDirection()">
    <div id="wall-top"></div>
    <div id="wall-bottom"></div>
    <div id="score">0m</div>
    
    <div id="gamestartbotton" onclick="gamestart(event)">
        <div id="triangle"></div>
    </div>
    
    <div id="player">
        <div id="eye">
            <div id="eyeball"><div id="reflection"></div></div>
        </div>
    </div>
    
    <div id="spike"></div>
</div>

</body>
</html>
