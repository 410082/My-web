<!DOCTYPE html>
<html>
<head>
<style>
#background {
    position: relative;
    width: 1000px;
    height: 500px;
    background-color: rgb(192, 192, 192);
    border: solid 50px rgb(78, 77, 77);
    border-radius: 30px;
}
#gamestartbotton {
    height: 80px;
    width: 80px;
    background-color: rgba(66, 66, 66, 0.829);
    border: solid 20px rgba(255, 255, 255, 0.884);
    position: absolute;
    top: 200px;
    left: 450px;
}
#triangle {
    height: 0px;
    width: 0px;
    border-style: solid;
    position: absolute;
    top: 10px;
    left: 10px;
    border-width: 30px 0px 30px 60px;
    border-color: transparent transparent transparent rgb(53, 52, 52);
}
#player {
    width: 50px;
    height: 50px;
    background: black;
    border-radius: 20px;
    position: absolute;
    left: 100px;
    top: 225px;
    transition: transform 0.1s;
}
#eye {
    width: 30px;
    height: 30px;
    border-radius: 30px;
    background-color: white;
    position: absolute;
    top: 10px;
    right: 5px;
}
#eyeball {
    width: 20px;
    height: 20px;
    border-radius: 20px;
    background-color: black;
    position: absolute;
    top: 5px;
    right: 5px;
}
#reflection {
    width: 10px;
    height: 10px;
    border-radius: 15px;
    background-color: white;
    position: absolute;
    top: 0px;
    right: 0px;
}
#wall-top {
    width: 1000px;
    height: 60px;
    position: absolute;
    top: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
}
#wall-bottom {
    width: 1000px;
    height: 60px;
    position: absolute;
    bottom: 0px;
    left: 0px;
    background-color: rgb(51, 50, 50);
}
#spike {
    position: absolute;
    left: 1000px;
    background-color: rgb(51, 50, 50);
    width: 100px;
    height: 200px;
    top: 240px;
}
#score {
    position: absolute;
    top: 75px;
    left: 20px;
    font-size: 24px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    color: rgb(51, 50, 50);
}
</style>
<script>
gameInterval = null;
timeInterval = null;
playerY = 225;
playerDirection = 1;
spikeX = 1000;
spikeY = 240;
spikeW = 100;
spikeH = 200;
isSpikeOnCeiling = 0;
isPlaying = false;
time = 0;
speed = 5;
distance = 0;

function changeDirection() {
    if (isPlaying == false) return;
    playerDirection = playerDirection * -1;
    player = document.getElementById("player");
    if (playerDirection == 1) {
        player.style.transform = "rotate(30deg)";
    } else {
        player.style.transform = "rotate(-30deg)";
    }
}

function gamestart() {
    if (isPlaying == true) return;
    
    isPlaying = true;
    document.getElementById("gamestartbotton").style.display = "none";
    document.getElementById("player").style.transform = "rotate(30deg)";

    document.getElementById("spike").style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";

    timeInterval = setInterval(function() {
        time++;
        speed = 0.15 * time + 5;
    }, 1000);

    gameInterval = setInterval(function() {
        player = document.getElementById("player");
        spike = document.getElementById("spike");

        playerY += playerDirection * 5; 
        
        if (playerY <= 60 || playerY >= 390) {
            alert("Game Over! Distance: " + Math.floor(distance) + "m");
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            location.reload();
            return;
        }
        
        player.style.top = playerY + "px";

        spikeX -= speed;
        
        if (spikeX > 1000) {
            spike.style.display = "none";
        } else if (spikeX < -spikeW) {
            spikeX = 1000;
            spike.style.display = "none";
            
            spikeW = Math.floor(Math.random() * 81) + 80;
            spikeH = Math.floor(Math.random() * 121) + 100;
            
            spike.style.width = spikeW + "px";
            spike.style.height = spikeH + "px";

            if (Math.random() < 0.5) {
                isSpikeOnCeiling = 1;
                spikeY = 60;
                spike.style.clipPath = "polygon(50% 100%, 0% 0%, 100% 0%)";
            } else {
                isSpikeOnCeiling = 0;
                spikeY = 440 - spikeH;
                spike.style.clipPath = "polygon(50% 0%, 0% 100%, 100% 100%)";
            }
            spike.style.top = spikeY + "px";
        } else {
            spike.style.display = "block";
        }
        
        spike.style.left = spikeX + "px";

        distance += 0.1;
        document.getElementById("score").innerText = Math.floor(distance) + "m";

        if (spikeX < 150 && spikeX + spikeW > 100) {
            if (isSpikeOnCeiling == 1) {
                if (playerY < 60 + spikeH - 15) {
                    alert("Game Over! Distance: " + Math.floor(distance) + "m");
                    clearInterval(gameInterval);
                    clearInterval(timeInterval);
                    location.reload();
                }
            } else {
                if (playerY + 50 > spikeY + 15) {
                    alert("Game Over! Distance: " + Math.floor(distance) + "m");
                    clearInterval(gameInterval);
                    clearInterval(timeInterval);
                    location.reload();
                }
            }
        }
    }, 20);
}
</script>
</head>
<body>

<div id="background" onclick="changeDirection()">
    <div id="wall-top"></div>
    <div id="wall-bottom"></div>
    <div id="score">0m</div>
    
    <div id="gamestartbotton" onclick="gamestart()">
        <div id="triangle"></div>
    </div>
    
    <div id="player">
        <div id="eye">
            <div id="eyeball"><div id="reflection"></div></div>
        </div>
    </div>
    
    <div id="spike"></div>
</div>

</body>
</html>
