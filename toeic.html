<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC 刷題庫 Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --gold: #f0b429;
    --gold-dim: #b38000;
    --blue: #388bfd;
    --green: #3fb950;
    --red: #f85149;
    --purple: #a371f7;
    --orange: #f78166;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Top Bar ── */
  #topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 18px; letter-spacing: .5px;
  }
  .logo-badge {
    background: var(--gold);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .score-bar {
    display: flex; align-items: center; gap: 16px;
  }
  .score-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2);
  }
  .score-item span { color: var(--text); font-weight: 600; }
  .xp-pill {
    background: linear-gradient(135deg, #f0b42920, #f0b42940);
    border: 1px solid #f0b42950;
    color: var(--gold);
    padding: 4px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }

  /* ── Main Content ── */
  #main { flex: 1; display: flex; }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
  }
  .cat-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text3); padding: 0 20px 8px;
    text-transform: uppercase;
  }
  .cat-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 20px;
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 14px;
    text-align: left; transition: all .15s;
  }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active {
    background: linear-gradient(90deg, #388bfd18, transparent);
    color: var(--blue);
    border-left: 2px solid var(--blue);
  }
  .cat-icon { font-size: 16px; width: 20px; text-align: center; }
  .cat-count {
    margin-left: auto;
    background: var(--surface2);
    color: var(--text3);
    font-size: 11px;
    padding: 1px 7px; border-radius: 10px;
  }
  .cat-btn.active .cat-count { background: #388bfd22; color: var(--blue); }

  /* ── Content Panel ── */
  #content { flex: 1; overflow-y: auto; padding: 24px; max-width: 900px; }

  /* ── Dashboard ── */
  #dashboard { }
  .dash-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .dash-sub { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .stat-card.gold .stat-num { color: var(--gold); }
  .stat-card.blue .stat-num { color: var(--blue); }
  .stat-card.green .stat-num { color: var(--green); }
  .stat-card.purple .stat-num { color: var(--purple); }

  .progress-section { margin-bottom: 24px; }
  .progress-title {
    font-size: 14px; font-weight: 600; color: var(--text2);
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: .8px;
  }
  .prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .prog-name { font-size: 13px; width: 100px; flex-shrink: 0; }
  .prog-track {
    flex: 1; height: 6px; background: var(--surface2);
    border-radius: 10px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 10px;
    transition: width .5s ease;
  }
  .prog-pct { font-size: 12px; color: var(--text2); width: 36px; text-align: right; }

  .cat-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px; cursor: pointer;
    transition: all .15s; text-align: left;
    display: flex; flex-direction: column; gap: 8px;
  }
  .cat-card:hover { border-color: var(--blue); background: var(--surface2); transform: translateY(-1px); }
  .cat-card-icon { font-size: 24px; }
  .cat-card-title { font-size: 15px; font-weight: 600; }
  .cat-card-sub { font-size: 12px; color: var(--text2); }
  .cat-card-meta { display: flex; gap: 10px; margin-top: 4px; }
  .meta-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); color: var(--text3);
  }

  /* ── Question View ── */
  #question-view { display: none; }
  .qv-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--blue); }
  .qv-title { font-size: 20px; font-weight: 700; }

  .progress-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .q-counter { font-size: 14px; color: var(--text2); white-space: nowrap; }
  .q-counter strong { color: var(--text); }
  .main-progress { flex: 1; height: 8px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
  .main-progress-fill { height: 100%; background: linear-gradient(90deg,var(--blue),var(--purple)); border-radius: 10px; transition: width .4s ease; }
  .score-badge { font-size: 13px; font-weight: 600; color: var(--green); white-space: nowrap; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-meta { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .q-type-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; letter-spacing: .5px;
  }
  .badge-grammar { background: #388bfd22; color: var(--blue); border: 1px solid #388bfd40; }
  .badge-vocab { background: #a371f722; color: var(--purple); border: 1px solid #a371f740; }
  .badge-reading { background: #3fb95022; color: var(--green); border: 1px solid #3fb95040; }
  .badge-listening { background: #f0b42922; color: var(--gold); border: 1px solid #f0b42940; }
  .badge-cloze { background: #f7816622; color: var(--orange); border: 1px solid #f7816640; }
  .badge-passage { background: #f8514922; color: var(--red); border: 1px solid #f8514940; }
  .q-num { font-size: 12px; color: var(--text3); }

  .q-passage {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px;
    font-size: 14px; line-height: 1.8;
    color: var(--text2); margin-bottom: 16px;
  }
  .q-passage .blank { color: var(--gold); font-weight: 700; border-bottom: 2px dashed var(--gold-dim); }

  .q-stem {
    font-size: 16px; line-height: 1.7; margin-bottom: 16px;
    font-weight: 500;
  }
  .q-stem .blank { color: var(--gold); border-bottom: 2px dashed var(--gold-dim); padding: 0 4px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 12px 16px; cursor: pointer;
    font-size: 14px; line-height: 1.6; text-align: left;
    transition: all .15s; color: var(--text);
  }
  .option-btn:hover:not(.disabled) { border-color: var(--blue); background: #388bfd10; }
  .option-btn.correct { border-color: var(--green); background: #3fb95015; }
  .option-btn.wrong { border-color: var(--red); background: #f8514915; }
  .option-btn.disabled { cursor: default; }
  .opt-letter {
    width: 24px; height: 24px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text2);
    transition: all .15s;
  }
  .option-btn.correct .opt-letter { background: var(--green); color: #000; border-color: var(--green); }
  .option-btn.wrong .opt-letter { background: var(--red); color: #fff; border-color: var(--red); }

  /* Explanation */
  .explanation {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .explanation.show { display: block; }
  .exp-title {
    font-size: 14px; font-weight: 700; color: var(--text2);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    text-transform: uppercase; letter-spacing: .6px;
  }
  .exp-section { margin-bottom: 14px; }
  .exp-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 6px;
  }
  .exp-content { font-size: 14px; line-height: 1.8; color: var(--text2); }
  .exp-content strong { color: var(--text); }

  .vocab-cards { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .vocab-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px;
  }
  .vocab-word { font-weight: 700; color: var(--blue); }
  .vocab-pos { color: var(--purple); font-size: 11px; font-style: italic; margin-left: 4px; }
  .vocab-level { color: var(--gold); font-size: 11px; margin-left: 4px; font-weight: 600; }
  .vocab-meaning { color: var(--text2); margin-top: 2px; font-size: 12px; }
  .vocab-note { color: var(--text3); font-size: 11px; margin-top: 2px; }

  .next-btn {
    background: var(--blue);
    color: #fff; border: none; padding: 12px 28px;
    border-radius: 8px; cursor: pointer; font-size: 15px;
    font-weight: 600; transition: all .15s; width: 100%;
    margin-top: 4px;
  }
  .next-btn:hover { background: #1f6feb; }
  .next-btn:disabled { opacity: .4; cursor: default; }

  /* Listening simulation */
  .audio-sim {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 16px;
  }
  .play-btn {
    width: 44px; height: 44px;
    background: var(--blue); border: none; border-radius: 50%;
    color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .play-btn:hover { background: #1f6feb; transform: scale(1.05); }
  .audio-info { flex: 1; }
  .audio-title { font-size: 13px; color: var(--text2); }
  .audio-wave { height: 32px; display: flex; align-items: center; gap: 3px; margin-top: 6px; }
  .wave-bar {
    width: 3px; border-radius: 2px; background: var(--border);
    transition: background .2s;
  }
  .audio-transcript {
    font-size: 13px; color: var(--text3); font-style: italic;
    border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px;
    line-height: 1.7; display: none;
  }
  .audio-transcript.show { display: block; }

  /* Result Screen */
  #result-view {
    display: none;
    text-align: center; padding: 40px 20px;
  }
  .result-circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: conic-gradient(var(--gold) 0%, var(--gold) var(--pct), var(--surface2) var(--pct));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .result-inner {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--surface); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .result-pct { font-size: 22px; font-weight: 800; color: var(--gold); }
  .result-label { font-size: 11px; color: var(--text3); }
  .result-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .result-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
  .result-row {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 28px;
  }
  .result-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 24px;
  }
  .result-stat-num { font-size: 26px; font-weight: 700; }
  .result-stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .restart-btn {
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); padding: 12px 28px; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all .15s; margin: 0 6px;
  }
  .restart-btn:hover { border-color: var(--blue); color: var(--blue); }
  .restart-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .restart-btn.primary:hover { background: #1f6feb; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .cat-cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top Bar -->
  <div id="topbar">
    <div class="logo">📘 TOEIC<span class="logo-badge">PRO</span></div>
    <div class="score-bar">
      <div class="score-item">✅ 答對 <span id="tb-correct">0</span></div>
      <div class="score-item">❌ 答錯 <span id="tb-wrong">0</span></div>
      <div class="xp-pill">⭐ <span id="tb-xp">0</span> XP</div>
    </div>
  </div>

  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="cat-label">題目分類</div>
      <button class="cat-btn active" onclick="showDashboard()" id="sb-home">
        <span class="cat-icon">🏠</span> 首頁總覽
      </button>
      <button class="cat-btn" onclick="startCategory('grammar')" id="sb-grammar">
        <span class="cat-icon">📐</span> 文法
        <span class="cat-count">45</span>
      </button>
      <button class="cat-btn" onclick="startCategory('vocab')" id="sb-vocab">
        <span class="cat-icon">🔤</span> 詞彙
        <span class="cat-count">40</span>
      </button>
      <button class="cat-btn" onclick="startCategory('reading')" id="sb-reading">
        <span class="cat-icon">📖</span> 閱讀理解
        <span class="cat-count">30</span>
      </button>
      <button class="cat-btn" onclick="startCategory('listening')" id="sb-listening">
        <span class="cat-icon">🎧</span> 聽力
        <span class="cat-count">35</span>
      </button>
      <button class="cat-btn" onclick="startCategory('cloze')" id="sb-cloze">
        <span class="cat-icon">✏️</span> 克漏字
        <span class="cat-count">30</span>
      </button>
      <button class="cat-btn" onclick="startCategory('passage')" id="sb-passage">
        <span class="cat-icon">📄</span> 文章閱讀
        <span class="cat-count">25</span>
      </button>
      <div style="margin-top:20px; border-top:1px solid var(--border); padding: 16px 20px 0;">
        <button class="cat-btn" onclick="startCategory('all')" style="padding-left:0;">
          <span class="cat-icon">🎯</span> 全部混合練習
        </button>
      </div>
    </div>

    <!-- Content -->
    <div id="content">

      <!-- Dashboard -->
      <div id="dashboard">
        <div class="dash-title">TOEIC 刷題庫 Pro</div>
        <div class="dash-sub">精選 205 題 · 完整詳解 · 即時評分 · 進度追蹤</div>

        <div class="stats-row">
          <div class="stat-card gold">
            <div class="stat-num" id="stat-xp">0</div>
            <div class="stat-label">總 XP</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-num" id="stat-done">0</div>
            <div class="stat-label">已完成題數</div>
          </div>
          <div class="stat-card green">
            <div class="stat-num" id="stat-acc">—</div>
            <div class="stat-label">正確率</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-num" id="stat-streak">0</div>
            <div class="stat-label">連勝</div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-title">各題型進度</div>
          <div id="cat-progress"></div>
        </div>

        <div class="cat-cards" id="cat-cards"></div>
      </div>

      <!-- Question View -->
      <div id="question-view">
        <div class="qv-header">
          <button class="back-btn" onclick="showDashboard()">← 返回</button>
          <div class="qv-title" id="qv-title"></div>
        </div>
        <div class="progress-header">
          <div class="q-counter">題 <strong id="q-num">1</strong> / <strong id="q-total">10</strong></div>
          <div class="main-progress"><div class="main-progress-fill" id="q-progress-fill"></div></div>
          <div class="score-badge" id="q-score-badge">+0 XP</div>
        </div>
        <div id="q-body"></div>
      </div>

      <!-- Result View -->
      <div id="result-view">
        <div class="result-circle" id="result-circle">
          <div class="result-inner">
            <div class="result-pct" id="result-pct"></div>
            <div class="result-label">正確率</div>
          </div>
        </div>
        <div class="result-title" id="result-title"></div>
        <div class="result-sub" id="result-sub"></div>
        <div class="result-row">
          <div class="result-stat">
            <div class="result-stat-num" id="res-correct" style="color:var(--green)"></div>
            <div class="result-stat-lbl">答對</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-num" id="res-wrong" style="color:var(--red)"></div>
            <div class="result-stat-lbl">答錯</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-num" id="res-xp" style="color:var(--gold)"></div>
            <div class="result-stat-lbl">XP 獲得</div>
          </div>
        </div>
        <div>
          <button class="restart-btn" onclick="showDashboard()">返回首頁</button>
          <button class="restart-btn primary" id="retry-btn">再練一次</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  QUESTION DATABASE  (205 questions)
// ═══════════════════════════════════════════════════
const QUESTIONS = {

// ──────────────────────────────────────────────────
// GRAMMAR  (45 題)
// ──────────────────────────────────────────────────
grammar: [
{
  type:'grammar', stem:'The marketing team _____ a new advertising strategy for the upcoming product launch.',
  options:['is developing','are developing','has been develop','developing'],
  answer:0,
  exp:{
    core:'主詞 "The marketing team" 為集合名詞，美式英文視為單數，動詞用單數。進行式 is developing 表示目前正在進行中的動作。',
    grammar:'集合名詞（team, staff, committee）+ 單數動詞（美式）；現在進行式 = be + V-ing',
    phrase:'"advertising strategy" 廣告策略；"product launch" 產品上市',
    vocab:[
      {word:'strategy',pos:'n.',level:'600+',meaning:'策略、戰略',note:'商業必備詞'},
      {word:'launch',pos:'n./v.',level:'500+',meaning:'上市；發射',note:'TOEIC 高頻詞'},
    ]
  }
},
{
  type:'grammar', stem:'All employees _____ submit their expense reports by the end of the month.',
  options:['must','musts','are must','be must'],
  answer:0,
  exp:{

// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════
const state = {
  totalXP: parseInt(localStorage.getItem('toeic_xp') || '0'),
  totalCorrect: parseInt(localStorage.getItem('toeic_correct') || '0'),
  totalWrong: parseInt(localStorage.getItem('toeic_wrong') || '0'),
  streak: parseInt(localStorage.getItem('toeic_streak') || '0'),
  catDone: JSON.parse(localStorage.getItem('toeic_catdone') || '{}'),
  currentCat: null,
  currentQs: [],
  currentIdx: 0,
  sessionCorrect: 0,
  sessionWrong: 0,
  sessionXP: 0,
  answered: false,
};

const CAT_INFO = {
  grammar:  { label:'文法', icon:'📐', color:'var(--blue)', fill:'#388bfd' },
  vocab:    { label:'詞彙', icon:'🔤', color:'var(--purple)', fill:'#a371f7' },
  reading:  { label:'閱讀理解', icon:'📖', color:'var(--green)', fill:'#3fb950' },
  listening:{ label:'聽力', icon:'🎧', color:'var(--gold)', fill:'#f0b429' },
  cloze:    { label:'克漏字', icon:'✏️', color:'var(--orange)', fill:'#f78166' },
  passage:  { label:'文章閱讀', icon:'📄', color:'var(--red)', fill:'#f85149' },
};

// ═══════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════
function save() {
  localStorage.setItem('toeic_xp', state.totalXP);
  localStorage.setItem('toeic_correct', state.totalCorrect);
  localStorage.setItem('toeic_wrong', state.totalWrong);
  localStorage.setItem('toeic_streak', state.streak);
  localStorage.setItem('toeic_catdone', JSON.stringify(state.catDone));
}

// ═══════════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════════
function updateTopBar() {
  document.getElementById('tb-correct').textContent = state.totalCorrect;
  document.getElementById('tb-wrong').textContent = state.totalWrong;
  document.getElementById('tb-xp').textContent = state.totalXP;
}

function renderDashboard() {
  document.getElementById('stat-xp').textContent = state.totalXP;
  document.getElementById('stat-done').textContent = state.totalCorrect + state.totalWrong;
  const total = state.totalCorrect + state.totalWrong;
  document.getElementById('stat-acc').textContent = total ? Math.round(state.totalCorrect / total * 100) + '%' : '—';
  document.getElementById('stat-streak').textContent = state.streak;

  // Progress bars
  const pg = document.getElementById('cat-progress');
  pg.innerHTML = '';
  for (const [cat, info] of Object.entries(CAT_INFO)) {
    const done = state.catDone[cat] || 0;
    const total = QUESTIONS[cat].length;
    const pct = total ? Math.round(done / total * 100) : 0;
    pg.innerHTML += `
      <div class="prog-row">
        <div class="prog-name">${info.icon} ${info.label}</div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${info.fill}"></div></div>
        <div class="prog-pct">${pct}%</div>
      </div>`;
  }

  // Cat cards
  const cc = document.getElementById('cat-cards');
  cc.innerHTML = '';
  for (const [cat, info] of Object.entries(CAT_INFO)) {
    const done = state.catDone[cat] || 0;
    const total = QUESTIONS[cat].length;
    cc.innerHTML += `
      <button class="cat-card" onclick="startCategory('${cat}')">
        <div class="cat-card-icon">${info.icon}</div>
        <div class="cat-card-title">${info.label}</div>
        <div class="cat-card-sub">共 ${total} 題</div>
        <div class="cat-card-meta">
          <span class="meta-tag" style="color:${info.fill}">完成 ${done}/${total}</span>
        </div>
      </button>`;
  }
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function showView(id) {
  ['dashboard','question-view','result-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function showDashboard() {
  renderDashboard();
  showView('dashboard');
  updateTopBar();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sb-home').classList.add('active');
}

function startCategory(cat) {
  state.currentCat = cat;
  if (cat === 'all') {
    state.currentQs = Object.values(QUESTIONS).flat().sort(() => Math.random() - .5).slice(0,20);
    document.getElementById('qv-title').textContent = '🎯 全題型混合練習';
  } else {
    state.currentQs = [...QUESTIONS[cat]].sort(() => Math.random() - .5).slice(0,15);
    document.getElementById('qv-title').textContent = `${CAT_INFO[cat].icon} ${CAT_INFO[cat].label}`;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    const sb = document.getElementById(`sb-${cat}`);
    if (sb) sb.classList.add('active');
  }
  state.currentIdx = 0;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionXP = 0;
  state.answered = false;
  showView('question-view');
  document.getElementById('retry-btn').onclick = () => startCategory(cat);
  renderQuestion();
}

// ═══════════════════════════════════════════════════
//  QUESTION RENDER
// ═══════════════════════════════════════════════════
function renderQuestion() {
  const q = state.currentQs[state.currentIdx];
  const idx = state.currentIdx;
  const total = state.currentQs.length;
  state.answered = false;

  document.getElementById('q-num').textContent = idx + 1;
  document.getElementById('q-total').textContent = total;
  document.getElementById('q-progress-fill').style.width = (idx / total * 100) + '%';
  document.getElementById('q-score-badge').textContent = `+${state.sessionXP} XP`;

  const typeBadge = {
    grammar:'badge-grammar', vocab:'badge-vocab', reading:'badge-reading',
    listening:'badge-listening', cloze:'badge-cloze', passage:'badge-passage'
  }[q.type] || 'badge-grammar';

  const typeLabel = { grammar:'文法', vocab:'詞彙', reading:'閱讀', listening:'聽力', cloze:'克漏字', passage:'文章' }[q.type] || '';

  let audioHtml = '';
  if (q.type === 'listening') {
    const waveH = Array.from({length:20}, () => {
      const h = 8 + Math.random() * 20;
      return `<div class="wave-bar" style="height:${h}px"></div>`;
    }).join('');
    audioHtml = `
    <div class="audio-sim">
      <button class="play-btn" onclick="toggleTranscript(this)">▶</button>
      <div class="audio-info">
        <div class="audio-title">🎧 ${q.audioTitle}</div>
        <div class="audio-wave">${waveH}</div>
        <div class="audio-transcript" id="transcript-box">📝 Script: ${q.transcript}</div>
      </div>
    </div>`;
  }

  let passageHtml = '';
  if (q.passage) {
    passageHtml = `<div class="q-passage">${q.passage}</div>`;
  }

  const opts = q.options.map((o, i) => {
    const letters = ['A','B','C','D'];
    return `<button class="option-btn" onclick="selectAnswer(${i}, this)" id="opt-${i}">
      <div class="opt-letter">${letters[i]}</div>
      <div>${o}</div>
    </button>`;
  }).join('');

  document.getElementById('q-body').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-type-badge ${typeBadge}">${typeLabel}</span>
        <span class="q-num">第 ${idx+1} 題</span>
      </div>
      ${audioHtml}
      ${passageHtml}
      <div class="q-stem">${q.stem}</div>
      <div class="options" id="options-box">${opts}</div>
    </div>
    <div class="explanation" id="exp-box"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>
      ${idx + 1 >= total ? '查看結果 →' : '下一題 →'}
    </button>
  `;
}

function toggleTranscript(btn) {
  const t = document.getElementById('transcript-box');
  if (t.classList.contains('show')) {
    t.classList.remove('show');
    btn.textContent = '▶';
  } else {
    t.classList.add('show');
    btn.innerHTML = '⏸';
  }
}

function selectAnswer(idx, btn) {
  if (state.answered) return;
  state.answered = true;

  const q = state.currentQs[state.currentIdx];
  const correct = q.answer;
  const isCorrect = idx === correct;

  // Highlight options
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.classList.add('disabled');
    if (i === correct) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
  });

  // Score update
  if (isCorrect) {
    state.sessionCorrect++;
    state.totalCorrect++;
    state.streak++;
    const xp = 10 + Math.min(state.streak * 2, 20);
    state.sessionXP += xp;
    state.totalXP += xp;
    document.getElementById('q-score-badge').textContent = `+${state.sessionXP} XP`;
  } else {
    state.sessionWrong++;
    state.totalWrong++;
    state.streak = 0;
  }

  // Track cat progress
  if (state.currentCat && state.currentCat !== 'all') {
    state.catDone[state.currentCat] = (state.catDone[state.currentCat] || 0) + 1;
  }

  save();
  updateTopBar();
  showExplanation(q, isCorrect);
  document.getElementById('next-btn').disabled = false;
}

function showExplanation(q, isCorrect) {
  const exp = q.exp;
  const vocabCards = (exp.vocab || []).map(v => `
    <div class="vocab-card">
      <div><span class="vocab-word">${v.word}</span><span class="vocab-pos">${v.pos}</span><span class="vocab-level">[${v.level}]</span></div>
      <div class="vocab-meaning">${v.meaning}</div>
      ${v.note ? `<div class="vocab-note">💡 ${v.note}</div>` : ''}
    </div>
  `).join('');

  document.getElementById('exp-box').innerHTML = `
    <div class="exp-title">${isCorrect ? '✅' : '❌'} 詳細解析</div>
    <div class="exp-section">
      <div class="exp-label">📌 解題重點</div>
      <div class="exp-content">${exp.core}</div>
    </div>
    <div class="exp-section">
      <div class="exp-label">📐 文法重點</div>
      <div class="exp-content">${exp.grammar}</div>
    </div>
    <div class="exp-section">
      <div class="exp-label">🔗 片語用法</div>
      <div class="exp-content">${exp.phrase}</div>
    </div>
    ${vocabCards ? `<div class="exp-section"><div class="exp-label">📚 關鍵單字（含分數級別）</div><div class="vocab-cards">${vocabCards}</div></div>` : ''}
  `;
  document.getElementById('exp-box').classList.add('show');
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.currentQs.length) {
    showResult();
  } else {
    renderQuestion();
    document.getElementById('q-body').scrollIntoView({ behavior:'smooth', block:'start' });
  }
}

function showResult() {
  const total = state.currentQs.length;
  const pct = Math.round(state.sessionCorrect / total * 100);

  const titles = ['加油，繼續練習！💪','還不錯哦！📈','表現很好！🌟','非常優秀！🏆','滿分！TOEIC 達人！🎉'];
  const t = pct < 40 ? 0 : pct < 60 ? 1 : pct < 75 ? 2 : pct < 90 ? 3 : 4;

  document.getElementById('result-circle').style.setProperty('--pct', pct + '%');
  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('result-title').textContent = titles[t];
  document.getElementById('result-sub').textContent = `完成 ${total} 題，獲得 ${state.sessionXP} XP`;
  document.getElementById('res-correct').textContent = state.sessionCorrect;
  document.getElementById('res-wrong').textContent = state.sessionWrong;
  document.getElementById('res-xp').textContent = '+' + state.sessionXP;

  showView('result-view');
  updateTopBar();
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
showDashboard();
</script>
