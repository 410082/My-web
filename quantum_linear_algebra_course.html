                        iℏ (d/dt)|&Psi;(t)&gt; = Ĥ|&Psi;(t)&gt;
                    </div>
                    <p>其中 <span class="math">Ĥ</span> 是哈密頓算符（總能量矩陣）。這個微分方程在數學上的解，其實就是讓一個特殊的矩陣作用在初始狀態上：<span class="math">|&Psi;(t)&gt; = U(t)|&Psi;(0)&gt;</span>。</p>
                    <p>這個 <span class="math">U</span> 矩陣具有極其嚴格的線性代數性質，叫做<strong>酉矩陣 (Unitary Matrix)</strong>，滿足 <span class="math">U<sup>&dagger;</sup>U = I</span>。酉矩陣的物理意義是：<strong>它在複空間中做完美的保長旋轉，這確保了不論系統怎麼隨時間演化，總機率（向量長度的平方）永遠等於 100%</strong>。</p>
                `,
                hasModel: true,
                modelType: "schrodinger-evolution"
            }
        };

        let currentLesson = 1;

        function loadLesson(id) {
            currentLesson = id;
            
            // Highlight active menu
            document.querySelectorAll('.lesson-item').forEach((el, index) => {
                if(index + 1 === id) el.classList.add('active');
                else el.classList.remove('active');
            });

            const data = lessonsData[id];
            let html = `
                <div class="lesson-header">
                    <span class="lesson-tag">${data.tag}</span>
                    <h1 class="lesson-title">${data.title}</h1>
                </div>
                <div class="lesson-body">
                    ${data.content}
                </div>
            `;

            if (data.hasModel) {
                html += generateModelHTML(data.modelType);
            }

            html += `
                <div class="footer-nav">
                    <button class="btn" onclick="prevLesson()" ${id===1?'style="display:none;"':''}>上一課</button>
                    <button class="btn btn-success" onclick="nextLesson()" ${id===10?'style="display:none;"':''}>下一課，深入探索 &rarr;</button>
                </div>
            `;

            document.getElementById('lesson-content').innerHTML = html;
            
            // Initialize scripts/interactions for models if needed
            initModelLogic(data.modelType);
        }

        function nextLesson() { if(currentLesson < 10) loadLesson(currentLesson + 1); }
        function prevLesson() { if(currentLesson > 1) loadLesson(currentLesson - 1); }

        function generateModelHTML(type) {
            let interfaceHtml = `
                <div class="interactive-container">
                    <div class="interactive-title">🧬 即時互動量子代數模型</div>
                    <div class="interactive-layout">
            `;

            if (type === "qubit-vector" || type === "superposition") {
                interfaceHtml += `
                    <div class="interactive-cell control-panel">
                        <div class="slider-group">
                            <label class="slider-label">&alpha; 係數 (狀態 |0&gt; 的分量): <span id="alpha-val">1.00</span></label>
                            <input type="range" class="q-slider" id="vector-alpha" min="0" max="100" value="100" oninput="updateQubitVector(this.value)">
                        </div>
                        <div class="slider-group">
                            <label class="slider-label">&beta; 係數 (狀態 |1&gt; 的分量): <span id="beta-val">0.00</span></label>
                            <input type="range" class="q-slider" id="vector-beta" min="0" max="100" value="0" disabled>
                        </div>
                        <p style="font-size:12px; color:var(--text-muted);">歸一化約束：|&alpha;|&sup2; + |&beta;|&sup2; = 1。當你調整 &alpha; 時，&beta; 會自動計算以保持向量長度為 1。</p>
                    </div>
                    <div class="interactive-cell visualizer">
                        <svg width="200" height="200" style="background:#000; border-radius:50%;">
                            <!-- Grid lines -->
                            <line x1="0" y1="100" x2="200" y2="100" stroke="#333" stroke-dasharray="4"/>
                            <line x1="100" y1="0" x2="100" y2="200" stroke="#333" stroke-dasharray="4"/>
                            <!-- Labels -->
                            <text x="175" y="115" fill="#666" font-size="12">|0&gt; (X)</text>
                            <text x="105" y="20" fill="#666" font-size="12">|1&gt; (Y)</text>
                            <!-- State Vector Arrow -->
                            <line x1="100" y1="100" x2="200" y2="100" id="state-arrow" stroke="#f43f5e" stroke-width="4" marker-end="url(#arrow)"/>
                        </svg>
                    </div>
                `;
            } else if (type === "bloch-sphere" || type === "pauli-gates") {
                interfaceHtml += `
                    <div class="interactive-cell control-panel">
                        <p style="font-size:13px; margin-bottom:15px;">在三維布洛赫球面模型中，複數的威力展露無遺。任意純量子態皆可表示為球面上的一個點。</p>
                        ${type==='pauli-gates' ? `
                            <button class="btn btn-purple" onclick="applyPauliX()">施加包利 X 算符 (NOT 閘)</button>
                            <button class="btn btn-purple" onclick="applyPauliZ()">施加包利 Z 算符 (Phase Flip)</button>
                        ` : `
                            <div class="slider-group">
                                <label class="slider-label">緯度 &theta; (代表振幅比例): <span id="theta-val">0</span>&deg;</label>
                                <input type="range" class="q-slider" id="bloch-theta" min="0" max="180" value="0" oninput="drawBloch()">
                            </div>
                            <div class="slider-group">
                                <label class="slider-label">經度 &phi; (代表相對相位): <span id="phi-val">0</span>&deg;</label>
                                <input type="range" class="q-slider" id="bloch-phi" min="0" max="360" value="0" oninput="drawBloch()">
                            </div>
                        `}
                    </div>
                    <div class="interactive-cell visualizer">
                        <svg width="220" height="220" viewBox="0 0 220 220">
                            <!-- Draw Sphere Outer Circle -->
                            <circle cx="110" cy="110" r="80" stroke="#4b5563" stroke-width="1" fill="none"/>
                            <!-- Ellipse for Equator -->
                            <ellipse cx="110" cy="110" rx="80" ry="25" stroke="#374151" stroke-width="1" fill="none" stroke-dasharray="4"/>
                            <!-- Axes -->
                            <line x1="110" y1="20" x2="110" y2="200" stroke="#4b5563" stroke-dasharray="2"/>
                            <line x1="30" y1="110" x2="190" y2="110" stroke="#4b5563" stroke-dasharray="2"/>
                            <!-- Labels -->
                            <text x="105" y="15" fill="#fff" font-size="11">|0&gt;</text>
                            <text x="105" y="215" fill="#fff" font-size="11">|1&gt;</text>
                            <!-- Vector Indicator Line -->
                            <line x1="110" y1="110" x2="110" y2="30" id="bloch-arrow" stroke="#10b981" stroke-width="3"/>
                            <circle cx="110" cy="30" r="4" id="bloch-pointer" fill="#10b981"/>
                        </svg>
                    </div>
                `;
            } else if (type === "inner-product" || type === "matrix-op" || type === "hermitian") {
                interfaceHtml += `
                    <div class="interactive-cell control-panel">
                        <p>透過矩陣與向量乘法，我們可以看到線性代數算符如何改變幾何空間。</p>
                        <div class="slider-group">
                            <label class="slider-label">算符變形強度矩陣參數 <b>k</b>: <span id="matrix-k-val">1.0</span></label>
                            <input type="range" class="q-slider" id="matrix-k" min="-20" max="20" value="10" oninput="updateMatrixOp(this.value)">
                        </div>
                        <div class="math-block" style="font-size:14px; text-align:left;">
                            當前算符 Â = <div class="matrix"><div class="matrix-row"><div class="matrix-cell" id="m00">1</div><div class="matrix-cell">0</div></div><div class="matrix-row"><div class="matrix-cell">0</div><div class="matrix-cell" id="m11">1.0</div></div></div>
                        </div>
                    </div>
                    <div class="interactive-cell visualizer">
                        <svg width="200" height="200">
                            <line x1="0" y1="100" x2="200" y2="100" stroke="#333"/>
                            <line x1="100" y1="0" x2="100" y2="200" stroke="#333"/>
                            <!-- Original Vector -->
                            <line x1="100" y1="100" x2="170" y2="30" stroke="#9ca3af" stroke-width="2" stroke-dasharray="3"/>
                            <!-- Transformed Vector -->
                            <line x1="100" y1="100" x2="170" y2="30" id="transform-arrow" stroke="#3b82f6" stroke-width="3"/>
                        </svg>
                    </div>
                `;
            } else if (type === "born-rule" || type === "eigen-measure" || type === "schrodinger-evolution") {
                interfaceHtml += `
                    <div class="interactive-cell control-panel">
                        <p>現在系統正處於一個線性疊加態向量。當我們施加物理觀測（量測矩陣）時，系統將會隨機塌縮。</p>
                        <button class="btn btn-success" onclick="triggerQuantumMeasurement()">💥 進行物理量測 (觀測塌縮)</button>
                        <button class="btn" onclick="resetQuantumState()">重置回疊加態</button>
                        
                        <div class="stat-grid">
                            <div class="stat-card">
                                <div style="font-size:11px; color:var(--text-muted);">得到 |0&gt; 理論機率</div>
                                <div class="stat-val" id="p0-val">50%</div>
                            </div>
                            <div class="stat-card" style="border-left:none;">
                                <div style="font-size:11px; color:var(--text-muted);">得到 |1&gt; 理論機率</div>
                                <div class="stat-val" id="p1-val">50%</div>
                            </div>
                        </div>
                    </div>
                    <div class="interactive-cell visualizer">
                        <div id="measurement-result-text" style="font-size:14px; font-weight:bold; color:var(--accent-purple); margin-bottom:10px;">系統狀態：均勻疊加態</div>
                        <svg width="200" height="120" style="background:rgba(0,0,0,0.2); border-radius:4px;">
                            <text x="10" y="30" fill="#fff" font-size="12">|0&gt; 狀態機率條：</text>
                            <rect x="10" y="40" width="180" height="15" fill="#374151" rx="3"/>
                            <rect x="10" y="40" width="90" height="15" fill="#3b82f6" id="bar-p0" rx="3"/>
                            
                            <text x="10" y="80" fill="#fff" font-size="12">|1&gt; 狀態機率條：</text>
                            <rect x="10" y="40" width="180" height="15" fill="#374151" rx="3"/>
                            <rect x="10" y="90" width="180" height="15" fill="#374151" rx="3"/>
                            <rect x="10" y="90" width="90" height="15" fill="#10b981" id="bar-p1" rx="3"/>
                        </svg>
                    </div>
                `;
            }

            interfaceHtml += `
                    </div>
                </div>
            `;
            return interfaceHtml;
        }

        // INTERACTIVE ENGINE LOGIC
        function initModelLogic(type) {
            if (type === "qubit-vector" || type === "superposition") {
                updateQubitVector(70); // Set initial mix
                if(document.getElementById('vector-alpha') && type === 'qubit-vector') {
                     document.getElementById('vector-alpha').value = 100;
                     updateQubitVector(100);
                }
            } else if (type === "bloch-sphere") {
                drawBloch();
            } else if (type === "matrix-op" || type === "hermitian") {
                updateMatrixOp(10);
            } else if (type === "born-rule" || type === "eigen-measure" || type === "schrodinger-evolution") {
                // Initialize default 50-50 state probabilities
                document.getElementById('p0-val').innerText = "50%";
                document.getElementById('p1-val').innerText = "50%";
            }
        }

        // Qubit Vector Update
        function updateQubitVector(val) {
            let alphaSq = val / 100;
            let alpha = Math.sqrt(alphaSq);
            let beta = Math.sqrt(1 - alphaSq);
            
            if(document.getElementById('alpha-val')) {
                document.getElementById('alpha-val').innerText = alpha.toFixed(2);
                document.getElementById('beta-val').innerText = beta.toFixed(2);
            }

            // Map to SVG coordinates (Center 100,100, radius 80)
            let x = 100 + (alpha * 80);
            let y = 100 - (beta * 80); // Y-axis goes downwards in SVG

            let arrow = document.getElementById('state-arrow');
            if (arrow) {
                arrow.setAttribute('x2', x);
                arrow.setAttribute('y2', y);
            }
        }

        // Bloch Sphere Projection Logic
        function drawBloch() {
            let thetaEl = document.getElementById('bloch-theta');
            let phiEl = document.getElementById('bloch-phi');
            if(!thetaEl || !phiEl) return;

            let theta = thetaEl.value * Math.PI / 180;
            let phi = phiEl.value * Math.PI / 180;

            document.getElementById('theta-val').innerText = thetaEl.value;
            document.getElementById('phi-val').innerText = phiEl.value;

            // Compute 3D to 2D projection coordinates for the sphere display
            let r = 80;
            let x3d = Math.sin(theta) * Math.cos(phi);
            let y3d = Math.sin(theta) * Math.sin(phi);
            let z3d = Math.cos(theta);

            // Project 3D onto 2D viewport space
            let screenX = 110 + r * (x3d * 0.7 + y3d * -0.4);
            let screenY = 110 - r * z3d;

            let arrow = document.getElementById('bloch-arrow');
            let pointer = document.getElementById('bloch-pointer');
            if(arrow && pointer) {
                arrow.setAttribute('x2', screenX);
                arrow.setAttribute('y2', screenY);
                pointer.setAttribute('cx', screenX);
                pointer.setAttribute('cy', screenY);
            }
        }

        let isFlipped = false;
        function applyPauliX() {
            let arrow = document.getElementById('bloch-arrow');
            let pointer = document.getElementById('bloch-pointer');
            if(!arrow) return;
            if(!isFlipped) {
                arrow.setAttribute('y2', 190);
                pointer.setAttribute('cy', 190);
                isFlipped = true;
            } else {
                arrow.setAttribute('y2', 30);
                pointer.setAttribute('cy', 30);
                isFlipped = false;
            }
        }

        function applyPauliZ() {
            alert("包利 Z 算符已作用：狀態在複平面上的相位已翻轉 &pi; 弧度（矩陣對角元素符號變更）！");
        }

        // Matrix Operation Linear Transformation Visualization
        function updateMatrixOp(val) {
            let k = val / 10;
            let m11 = document.getElementById('m11');
            if(m11) m11.innerText = k.toFixed(1);

            // Transformed standard vector (70, -70 relative to center 100,100)
            let origX = 70;
            let origY = -70;

            let newX = 100 + origX * 1.0;
            let newY = 100 + origY * k;

            let arrow = document.getElementById('transform-arrow');
            if(arrow) {
                arrow.setAttribute('x2', newX);
                arrow.setAttribute('y2', newY);
            }
        }

        // Born's Rule quantum state wave-collapse simulation
        function triggerQuantumMeasurement() {
            let rand = Math.random();
            let resultText = document.getElementById('measurement-result-text');
            let bar0 = document.getElementById('bar-p0');
            let bar1 = document.getElementById('bar-p1');

            if(rand < 0.5) {
                // Collapse to 0
                resultText.innerHTML = "💥 塌縮結果：<span style='color:var(--accent);'>|0&gt; 狀態</span> (機率幅平方判定)";
                bar0.setAttribute('width', '180');
                bar1.setAttribute('width', '0');
                document.getElementById('p0-val').innerText = "100%";
                document.getElementById('p1-val').innerText = "0%";
            } else {
                // Collapse to 1
                resultText.innerHTML = "💥 塌縮結果：<span style='color:var(--accent-success);'>|1&gt; 狀態</span> (機率幅平方判定)";
                bar0.setAttribute('width', '0');
                bar1.setAttribute('width', '180');
                document.getElementById('p0-val').innerText = "0%";
                document.getElementById('p1-val').innerText = "100%";
            }
        }

        function resetQuantumState() {
            document.getElementById('measurement-result-text').innerText = "系統狀態：已重置回均勻疊加態";
            document.getElementById('bar-p0').setAttribute('width', '90');
            document.getElementById('bar-p1').setAttribute('width', '90');
            document.getElementById('p0-val').innerText = "50%";
            document.getElementById('p1-val').innerText = "50%";
        }

        // Load entry lesson initially
        window.onload = function() {
            loadLesson(1);
        };
    </script>
</body>
</html>
