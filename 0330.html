<html>
<head>
<title>0330 the size and the position of the container</title>
<style>#d1{
           width: 100px;
           height:100px;
           border:solid 10px orangered;
           border:double 10px;
           border-color: red yellow blue green;

}
       #d2{
           width: 100px;
           height:50px; 
           border:solid 3px black;
           margin:10px/*y axis*/ 5px/*x axis*/;
           padding:10px/*x,y */;       
}
       #d3{
           width: 100px;
           height:100px;
           border:solid 10px;
           border-width:10px 20px 30px 40px;
           border-color: rgb(17, 10, 4) rgb(107, 78, 16) rgb(145, 112, 3) rgb(51, 37, 10);
}
       #r1{
           width: 100px;
           height:100px;
           border:solid 1px black;
           border-radius: 50px;
       }
       #p1{
           width: 0;
           height:0;
           border:solid ;
           border-color: transparent transparent green transparent;
           border-width: 0px 30px 30px 30px;
           margin-left: 65px;
       }
       #p2{
           width: 10;
           height:0;
           border:solid ;
           border-color: transparent transparent green transparent;
           border-width: 0px 50px 50px 50px;
           margin-left: 40px;
       }
       #p3{
           width: 30;
           height:0;
           border:solid ;
           border-color: transparent transparent green transparent;
           border-width: 0px 80px 80px 80px;
           margin-left: 0px;
       }    
       #c1{
        width: 50px;
        height:50px;
        background-color:rgb(255, 0, 0);
        position: absolute;
        top: 10px;
       }    
       #c2{
        width:50px;
        height:50px;
        background-color:blue;
        position:absolute;
        top: 20px;
        left:30px;
       }
</style>
</head>
<body>
 <div id="d1"></div>
 <div id="d2"></div>
 <div id="d3"></div>
 <div id="r1"></div>
 <div id="p1"></div>
 <div id="p2"></div>
 <div id="p3"></div>
 <div id="c1"></div>
 <div id="c2"></div>
</body>
</html>
